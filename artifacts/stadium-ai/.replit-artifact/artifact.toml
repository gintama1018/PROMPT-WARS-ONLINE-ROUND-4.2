kind = "web"
previewPath = "/"
title = "StadiumAI — FIFA World Cup 2026"
version = "1.0.0"
id = "artifacts/stadium-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19806

[services.development]
run = "pnpm --filter @workspace/stadium-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stadium-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/stadium-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19806"
BASE_PATH = "/"
